name: Pygame Test

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Pygame Application for 10 seconds
        run: |
          xvfb-run -a -s "-screen 0 1024x768x24" timeout 10 python FullRender/Main.py > log.txt 2>&1 || true
      
      - name: Generate Screenshot
        run: |
          xvfb-run -a -s "-screen 0 1024x768x24" python << 'EOF'
          import pygame
          pygame.init()
          screen = pygame.display.set_mode((1024, 768))
          screen.fill((0, 0, 0))
          pygame.image.save(screen, "sc.png")
          print("Screenshot saved as sc.png")
          EOF
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: pygame-artifacts
          path: |
            log.txt
            sc.png