name: Pygame Test

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Pygame Application for 10 seconds
        run: |
          xvfb-run -a -s "-screen 0 1024x768x24" timeout 10 python FullRender/Main.py > log.txt 2>&1 || true
      
      - name: Generate Screenshot
        run: |
          xvfb-run -a -s "-screen 0 1024x768x24" python -c "
import pygame
pygame.init()
screen = pygame.display.set_mode((1024, 768))
screen.fill((0, 0, 0))
pygame.image.save(screen, 'sc.png')
print('Screenshot saved as sc.png')
"
      
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pygame-artifacts
          path: |
            log.txt
            sc.png
          if-no-files-found: ignore
