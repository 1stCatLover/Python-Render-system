name: Pygame Test\n\non: [push]\n\njobs:\n  test:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Check out code\n        uses: actions/checkout@v2\n      - name: Set up Python 3.11\n        uses: actions/setup-python@v2\n        with:\n          python-version: '3.11'\n      - name: Install dependencies\n        run: |\n          python -m pip install --upgrade pip\n          pip install -r requirements.txt\n      - name: Run Pygame Application\n        run: |\n          xvfb-run --server-args='-screen 0 1024x768x24' python FullRender/Main.py > log.txt 2>&1 &\n          sleep 10\n      - name: Take screenshot\n        run: |\n          python -c 'import pygame; pygame.init(); screen = pygame.display.set_mode((800, 600)); pygame.image.save(screen, "sc.png")'\n      - name: Upload Artifacts\n        uses: actions/upload-artifact@v2\n        with:\n          name: pygame-artifacts\n          path: |\n            log.txt\n            sc.png\n